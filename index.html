<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Address Validator MVP (Mapy.cz API)</title>
<style>
body { font-family: Arial; max-width: 450px; margin: 40px auto; }
input { width: 100%; padding: 10px; margin: 8px 0; font-size: 16px; }
button { padding: 12px; width: 100%; font-size: 16px; cursor: pointer; }
#result { margin-top: 20px; white-space: pre-wrap; font-family: monospace; }
</style>
</head>
<body>

<h2>Address Validator MVP (Mapy.cz)</h2>

<input id="street" placeholder="Street (e.g. Kovářova)">
<input id="city" placeholder="City (e.g. Žďár nad Sázavou)">
<input id="zip" placeholder="ZIP (e.g. 59101)">
<button onclick="validateAddress()">Validate</button>

<div id="result"></div>

<script>
async function validateAddress() {
  const street = document.getElementById("street").value.trim();
  const city = document.getElementById("city").value.trim();
  const zip = document.getElementById("zip").value.trim();

  const query = `${street}, ${city}, ${zip}, Czech Republic`;

  document.getElementById("result").textContent = "Validating...";

  try {
    const res = await fetch(
      `https://api.mapy.cz/geocode?query=${encodeURIComponent(query)}`
    );

    const text = await res.text();

    // Mapy.cz returns XML, so we parse it
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "text/xml");

    const item = xml.querySelector("item");

    if (!item) {
      document.getElementById("result").textContent =
        JSON.stringify({ valid: false, reason: "Address not found" }, null, 2);
      return;
    }

    const foundCity = item.getAttribute("city");
    const foundStreet = item.getAttribute("street");
    const foundZip = item.getAttribute("zip");

    const isValid =
      foundCity?.toLowerCase() === city.toLowerCase() &&
      foundStreet?.toLowerCase() === street.toLowerCase() &&
      foundZip === zip;

    document.getElementById("result").textContent = JSON.stringify(
      {
        valid: isValid,
        input: { street, city, zip },
        matched: { foundStreet, foundCity, foundZip }
      },
      null,
      2
    );

  } catch (err) {
    document.getElementById("result").textContent =
      "Error contacting Mapy.cz API.";
  }
}
</script>

</body>
</html>
