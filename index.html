<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Address Validator – Žďár nad Sázavou</title>
<style>
    body { font-family: Arial; max-width: 450px; margin: 40px auto; }
    input { width: 100%; padding: 10px; margin: 8px 0; font-size: 16px; }
    button { padding: 12px; width: 100%; font-size: 16px; cursor: pointer; }
    #result { margin-top: 20px; white-space: pre-wrap; font-family: monospace; }
</style>
</head>
<body>

<h2>Address Validator (Žďár nad Sázavou)</h2>

<input id="street" placeholder="Street (e.g. Kovářova)">
<input id="city" placeholder="City (e.g. Žďár nad Sázavou)">
<input id="zip" placeholder="ZIP (e.g. 59101)">
<button onclick="validateAddress()">Validate</button>

<div id="result"></div>

<script>
let DB = {};

async function loadData() {
    console.log("Loading zdar.json...");
    const res = await fetch("zdar.json");

    if (!res.ok) {
        document.getElementById("result").textContent =
            "Error: zdar.json not found. Upload it to the same folder as index.html.";
        return;
    }

    DB = await res.json();
    console.log("DB loaded:", DB);
}

async function validateAddress() {
    console.log("validateAddress called");

    if (!Object.keys(DB).length) {
        await loadData();
    }

    const street = document.getElementById("street").value.trim();
    const city = document.getElementById("city").value.trim();
    const zip = document.getElementById("zip").value.trim();

    if (!DB[city]) {
        document.getElementById("result").textContent = JSON.stringify({
            valid: false,
            reason: "City not found",
            availableCities: Object.keys(DB)
        }, null, 2);
        return;
    }

    if (!DB[city][zip]) {
        document.getElementById("result").textContent = JSON.stringify({
            valid: false,
            reason: "ZIP does not belong to this city",
            validZips: Object.keys(DB[city])
        }, null, 2);
        return;
    }

    if (!DB[city][zip].includes(street)) {
        const matches = [];
        for (const z of Object.keys(DB[city])) {
            if (DB[city][z].includes(street)) {
                matches.push({ city, zip: z });
            }
        }

        document.getElementById("result").textContent = JSON.stringify({
            valid: false,
            reason: "Street does not exist in this ZIP",
            streetExistsIn: matches
        }, null, 2);
        return;
    }

    document.getElementById("result").textContent = JSON.stringify({
        valid: true,
        reason: "Address is valid"
    }, null, 2);
}

loadData();
</script>

</body>
</html>
