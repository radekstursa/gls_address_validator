<script>
// Database: cities → ZIPs → streets
const DB = {
  "Jihlava": {
    "58601": ["Husova", "Polní", "Srázná"],
    "58602": ["Okružní", "Březinova"]
  },
  "Žďár nad Sázavou": {
    "59101": ["Husova", "Studentská", "Novoměstská"]
  },
  "Brno": {
    "60200": ["Česká", "Veveří"],
    "60300": ["Kounicova"]
  }
};

// Find cities where a street exists
function findStreetInOtherCities(street) {
  const matches = [];
  for (const city of Object.keys(DB)) {
    for (const zip of Object.keys(DB[city])) {
      if (DB[city][zip].includes(street)) {
        matches.push({ city, zip });
      }
    }
  }
  return matches;
}

function validateAddress() {
  const city = document.getElementById("city").value.trim();
  const zip = document.getElementById("zip").value.trim();
  <input id="street" placeholder="Street (e.g. Husova)">
  const street = document.getElementById("street").value.trim();
  let result = {};

  // City not found
  if (!DB[city]) {
    result = {
      valid: false,
      reason: "Unknown city",
      suggestions: Object.keys(DB)
    };
    document.getElementById("result").textContent = JSON.stringify(result, null, 2);
    return;
  }

  // ZIP not valid for this city
  if (!DB[city][zip]) {
    result = {
      valid: false,
      reason: "ZIP does not belong to this city",
      validZips: Object.keys(DB[city])
    };
    document.getElementById("result").textContent = JSON.stringify(result, null, 2);
    return;
  }

  // Street not found in this city
  if (!DB[city][zip].includes(street)) {
    const otherCities = findStreetInOtherCities(street);

    result = {
      valid: false,
      reason: "Street does not exist in this city",
      streetExistsIn: otherCities
    };

    document.getElementById("result").textContent = JSON.stringify(result, null, 2);
    return;
  }

  // All good
  result = { valid: true, reason: "Address is valid" };
  document.getElementById("result").textContent = JSON.stringify(result, null, 2);
}
</script>
